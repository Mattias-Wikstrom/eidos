name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Haskell Wasm toolchain ─────────────────────────────────────────────
      - name: Install GHC Wasm toolchain
        run: |
          curl -sSf https://gitlab.haskell.org/ghc/ghc-wasm-meta/-/raw/master/bootstrap.sh | sh
          echo "$HOME/.ghc-wasm/bin" >> "$GITHUB_PATH"
          cat "$HOME/.ghc-wasm/env" >> "$GITHUB_ENV"

      - name: Cache wasm Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.ghc-wasm/.cabal/store
          key: wasm-cabal-${{ runner.os }}-${{ hashFiles('eidos-parser.cabal', 'cabal.project') }}
          restore-keys: wasm-cabal-${{ runner.os }}-

      # ── Build Wasm binary ──────────────────────────────────────────────────
      - name: Build eidos-wasm
        run: wasm32-wasi-cabal build exe:eidos-wasm

      - name: Copy and optimise wasm binary
        run: |
          cp "$(wasm32-wasi-cabal list-bin exe:eidos-wasm)" wasm/eidos.wasm
          wasm-opt -O2 wasm/eidos.wasm -o wasm/eidos.wasm
          cp wasm/eidos.wasm eidos-ui/public/wasm/eidos.wasm

      # ── Build UI ───────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: eidos-ui/package-lock.json

      - name: Install npm dependencies
        working-directory: eidos-ui
        run: npm ci

      - name: Build UI
        working-directory: eidos-ui
        run: npm run build

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: eidos-ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
