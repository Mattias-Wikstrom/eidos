name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: "9.14.1"
          cabal-version: "latest"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: cabal-${{ runner.os }}-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('eidos-parser.cabal', 'cabal.project') }}
          restore-keys: cabal-${{ runner.os }}-${{ steps.setup.outputs.ghc-version }}-

      - name: Build
        run: cabal build all

      - name: Run test suites
        run: cabal test all --test-show-details=streaming
